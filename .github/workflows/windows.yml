name: Build Windows

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc i686-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Check web frontend
        run: npm run web:build

      - name: Check Rust shell
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Build portable executable
        run: npm run build:portable

      - name: Build NSIS installer (x64)
        run: npm run build:installer

      - name: Build NSIS installer (x86)
        run: npm run build:installer:x86

      - name: Stage release packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $release = Join-Path $PWD 'release'
          $portable = Join-Path $release 'Foliate-Portable'
          New-Item -ItemType Directory -Force -Path $portable | Out-Null

          $binary = 'src-tauri/target/release/foliate4w.exe'
          if (-not (Test-Path $binary)) {
            throw 'Release executable was not generated.'
          }
          Copy-Item $binary (Join-Path $portable 'Foliate.exe')
          New-Item -ItemType File -Force -Path (Join-Path $portable 'portable.flag') | Out-Null

          $licenses = Join-Path $portable 'Licenses'
          New-Item -ItemType Directory -Force -Path $licenses | Out-Null
          Copy-Item 'COPYING' (Join-Path $licenses 'Foliate-GPL-3.0.txt')
          Copy-Item 'web/public/foliate-js/LICENSE' (Join-Path $licenses 'foliate-js-MIT.txt')
          Copy-Item 'node_modules/lucide/LICENSE' (Join-Path $licenses 'Lucide.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/cmaps/LICENSE' `
            (Join-Path $licenses 'PDF.js-CMaps.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/standard_fonts/LICENSE_FOXIT' `
            (Join-Path $licenses 'PDF.js-Foxit-Fonts.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/standard_fonts/LICENSE_LIBERATION' `
            (Join-Path $licenses 'PDF.js-Liberation-Fonts.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/wasm/LICENSE_OPENJPEG' `
            (Join-Path $licenses 'PDF.js-OpenJPEG.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/wasm/LICENSE_JBIG2' `
            (Join-Path $licenses 'PDF.js-JBIG2.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/wasm/LICENSE_QCMS' `
            (Join-Path $licenses 'PDF.js-QCMS.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/wasm/LICENSE_PDFJS_JBIG2' `
            (Join-Path $licenses 'PDF.js-JBIG2-Wrapper.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/wasm/LICENSE_PDFJS_OPENJPEG' `
            (Join-Path $licenses 'PDF.js-OpenJPEG-Wrapper.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/wasm/LICENSE_PDFJS_QCMS' `
            (Join-Path $licenses 'PDF.js-QCMS-Wrapper.txt')
          Copy-Item 'web/public/foliate-js/vendor/pdfjs/iccs/LICENSE' `
            (Join-Path $licenses 'PDF.js-ICC-Profiles.txt')
          # ponytail: zip.js and fflate are vendored under foliate-js/vendor as
          # bare .js files (no upstream LICENSE shipped alongside). Bundle the
          # texts from Licenses/ so MIT (fflate) and BSD-3-Clause (zip.js)
          # attribution obligations are met in the binary distribution.
          Copy-Item 'Licenses/zip.js-BSD-3-Clause.txt' `
            (Join-Path $licenses 'zip.js-BSD-3-Clause.txt')
          Copy-Item 'Licenses/fflate-MIT.txt' `
            (Join-Path $licenses 'fflate-MIT.txt')
          Copy-Item 'Licenses/Tauri-LICENSE-MIT.txt' `
            (Join-Path $licenses 'Tauri-LICENSE-MIT.txt')
          # GPLv3 §5(a): ship modification history alongside the binary so a
          # recipient without GitHub access can still see what changed from upstream.
          Copy-Item 'CHANGELOG.md' (Join-Path $portable 'CHANGELOG.md')

          $data = Join-Path $portable 'Data'
          foreach ($directory in @(
            'books', 'cache', 'config', 'covers', 'library', 'logs', 'temp', 'WebView2'
          )) {
            New-Item -ItemType Directory -Force -Path (Join-Path $data $directory) | Out-Null
          }
          @'
          This directory contains every file controlled by Foliate Portable.
          Keep portable.flag beside Foliate.exe to preserve portable mode.
          '@ | Set-Content -Encoding UTF8 (Join-Path $data 'README.txt')

          Compress-Archive `
            -Path $portable `
            -DestinationPath (Join-Path $release 'Foliate-Windows-x64-Portable.zip') `
            -CompressionLevel Optimal

          # Stage NSIS installer exe files with predictable names. productName
          # has spaces so we glob and rename; Tauri leaves them as
          # "<productName>_<version>_<arch>-setup.exe" by default.
          foreach ($target in @(
            @{ triple = 'x86_64-pc-windows-msvc'; out = 'Foliate-Windows-x64-Installer.exe' },
            @{ triple = 'i686-pc-windows-msvc';  out = 'Foliate-Windows-x86-Installer.exe' }
          )) {
            $nsis_dir = "src-tauri/target/$($target.triple)/release/bundle/nsis"
            $exe = Get-ChildItem -Path $nsis_dir -Filter '*.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName (Join-Path $release $target.out)
            } else {
              Write-Warning "No NSIS installer found for $($target.triple); skipping."
            }
          }

      - name: Upload portable edition
        uses: actions/upload-artifact@v7
        with:
          name: Foliate-Windows-x64-Portable
          if-no-files-found: error
          path: release/Foliate-Windows-x64-Portable.zip

      - name: Upload x64 installer
        uses: actions/upload-artifact@v7
        with:
          name: Foliate-Windows-x64-Installer
          if-no-files-found: error
          path: release/Foliate-Windows-x64-Installer.exe

      - name: Upload x86 installer
        uses: actions/upload-artifact@v7
        with:
          name: Foliate-Windows-x86-Installer
          if-no-files-found: error
          path: release/Foliate-Windows-x86-Installer.exe
